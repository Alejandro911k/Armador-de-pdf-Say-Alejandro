<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerar páginas — Say Alejandro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
        :root {
            --purple:       #832885;
            --purple-dark:  #5A2362;
            --purple-light: #EC6AFF;
            --yellow:       #EFDB5D;
            --yellow-dark:  #EABE59;
            --cream:        #F6EECA;
            --text:         #3a1a4d;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--cream); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

        header { background: var(--purple); box-shadow: 0 2px 16px rgba(90,35,98,.2); display: flex; align-items: center; gap: 14px; padding: 15px 36px; position: sticky; top: 0; z-index: 100; }
        .logo { width: 40px; height: 40px; flex-shrink: 0; }
        .header-text .brand { font-family: 'Titan One', cursive; font-size: 20px; color: var(--yellow); line-height: 1.15; letter-spacing: .01em; }
        .header-text .subtitle { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 10px; color: var(--cream); opacity: .45; letter-spacing: .14em; text-transform: uppercase; }
        .header-nav { margin-left: auto; }
        .nav-back { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px; color: rgba(246,238,202,.5); text-decoration: none; padding: 6px 14px; border: 1.5px solid rgba(246,238,202,.15); border-radius: 50px; transition: color .15s, border-color .15s; white-space: nowrap; }
        .nav-back:hover { color: var(--cream); border-color: rgba(246,238,202,.35); }

        main { flex: 1; width: 100%; max-width: 680px; margin: 0 auto; padding: 52px 24px 72px; }

        .hero { text-align: center; margin-bottom: 44px; }
        .hero h1 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(28px, 5vw, 46px); color: var(--purple); letter-spacing: -.015em; line-height: 1.1; margin-bottom: 14px; }
        .hero p { font-family: 'DM Sans', sans-serif; font-size: 15px; font-style: italic; color: var(--purple-dark); opacity: .55; max-width: 420px; margin: 0 auto; line-height: 1.65; }

        .upload-zone {
            position: relative; background: #fff;
            border: 2px dashed rgba(131,40,133,.28); border-radius: 20px;
            padding: 52px 40px; text-align: center; cursor: pointer;
            transition: border-color .2s, transform .18s, box-shadow .2s;
            box-shadow: 0 2px 20px rgba(90,35,98,.07);
        }
        .upload-zone:hover { border-color: var(--purple); transform: translateY(-2px); box-shadow: 0 12px 36px rgba(90,35,98,.13); }
        .upload-zone.drag-over { border-color: var(--purple-light); box-shadow: 0 0 0 4px rgba(236,106,255,.15); }
        .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .upload-icon-wrap { width: 56px; height: 56px; background: rgba(131,40,133,.08); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .upload-zone h2 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 19px; color: var(--purple); margin-bottom: 6px; }
        .upload-zone p { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--purple-dark); opacity: .5; }
        .pdf-info { display: flex; align-items: center; gap: 10px; justify-content: center; margin-top: 12px; }
        .pdf-badge { background: rgba(131,40,133,.09); border: 1.5px solid rgba(131,40,133,.2); border-radius: 50px; padding: 4px 14px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12px; color: var(--purple); }

        /* Options card */
        #optSection { margin-top: 32px; display: none; }

        .opts-card { background: #fff; border-radius: 20px; padding: 28px; box-shadow: 0 2px 20px rgba(90,35,98,.07); }
        .opts-card h3 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; color: var(--purple); margin-bottom: 22px; }

        .opt-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
        .opt-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
        .opt-group label { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; color: var(--purple-dark); opacity: .55; text-transform: uppercase; letter-spacing: .09em; }
        .opt-group select,
        .opt-group input[type="number"],
        .opt-group input[type="text"] {
            background: var(--cream);
            border: 1.5px solid rgba(131,40,133,.2);
            color: var(--text);
            border-radius: 10px;
            padding: 9px 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color .15s;
            width: 100%;
        }
        .opt-group select:focus,
        .opt-group input:focus { border-color: var(--purple); }

        /* Position selector visual */
        .pos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 4px; }
        .pos-btn {
            background: var(--cream);
            border: 1.5px solid rgba(131,40,133,.2);
            border-radius: 8px;
            padding: 8px 4px;
            cursor: pointer;
            transition: background .15s, border-color .15s;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 10px;
            color: var(--purple-dark);
            text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .pos-btn.active { background: rgba(131,40,133,.1); border-color: var(--purple); color: var(--purple); }
        .pos-btn:hover:not(.active) { background: rgba(131,40,133,.05); border-color: rgba(131,40,133,.35); }

        /* Preview bar */
        .preview-bar {
            background: rgba(131,40,133,.05);
            border: 1.5px solid rgba(131,40,133,.12);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .preview-label { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; color: var(--purple-dark); opacity: .5; text-transform: uppercase; letter-spacing: .08em; flex-shrink: 0; }
        .preview-text { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; color: var(--purple); }

        /* Actions */
        #actionsBar { margin-top: 24px; background: var(--purple-dark); border-radius: 16px; padding: 20px 22px; display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; }
        .opt { display: flex; flex-direction: column; gap: 6px; }
        .opt label { font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 800; color: var(--cream); opacity: .45; text-transform: uppercase; letter-spacing: .1em; }
        .opt input[type="text"] { background: rgba(131,40,133,.3); border: 1.5px solid rgba(246,238,202,.15); color: var(--cream); border-radius: 10px; padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color .15s; }
        .opt input:focus { border-color: rgba(246,238,202,.4); }
        .opt input::placeholder { color: rgba(246,238,202,.25); }
        .opt-name { flex: 1; min-width: 180px; }
        .spacer { flex: 1; }

        .btn-gen { background: var(--yellow); color: var(--purple-dark); border: none; border-radius: 50px; padding: 12px 28px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 15px; cursor: pointer; transition: background .2s, transform .18s, box-shadow .2s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .btn-gen:hover:not(:disabled) { background: var(--yellow-dark); transform: scale(1.04); box-shadow: 0 6px 22px rgba(234,190,89,.3); }
        .btn-gen:disabled { opacity: .35; cursor: not-allowed; }

        .progress-wrap { margin-top: 18px; display: none; }
        .progress-wrap.on { display: block; }
        .progress-label { font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; color: var(--cream); opacity: .55; margin-bottom: 8px; }
        .progress-bar { height: 4px; background: rgba(239,219,93,.1); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--yellow), var(--purple-light)); border-radius: 2px; transition: width .3s ease; }

        .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--purple-dark); border: 1.5px solid var(--yellow); color: var(--yellow); padding: 12px 24px; border-radius: 50px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; transition: transform .35s cubic-bezier(.34,1.56,.64,1); z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,.4); white-space: nowrap; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.err { border-color: var(--purple-light); color: var(--purple-light); }

        footer { background: var(--purple-dark); border-top: 2px solid var(--purple); text-align: center; padding: 18px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        footer .foot-brand { font-family: 'Titan One', cursive; font-size: 13px; color: var(--yellow); opacity: .35; }
        footer .foot-sep { font-size: 13px; color: var(--cream); opacity: .2; }
        footer .foot-text { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--cream); opacity: .2; }

        @media (max-width: 600px) {
            header { padding: 13px 18px; }
            main { padding: 36px 16px 56px; }
            .upload-zone { padding: 44px 20px; }
            #actionsBar { flex-direction: column; align-items: stretch; }
            .spacer { display: none; }
            .btn-gen { width: 100%; justify-content: center; }
            .opt-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <svg class="logo" viewBox="0 0 224.93 224.93" xmlns="http://www.w3.org/2000/svg">
        <rect fill="#832885" x="0" y="0" width="224.93" height="224.93" rx="112.47" ry="112.47"/>
        <path fill="#efdb5d" d="m137.83,91.89c-11,1.62-20.85-5.4-22.79-16.14-1.89-10.46,4.89-20.84,15.26-23.18,11.63-2.63,22.81,5.17,24.44,16.61,1.57,11.07-5.89,21.09-16.91,22.71Z"/>
        <path fill="#efdb5d" d="m81.25,92.22c-9.42,1.5-17.68-4.46-19.17-13.83-1.48-9.28,4.69-17.77,13.94-19.18,9.19-1.4,17.73,4.89,19.15,14.11,1.39,9-4.84,17.46-13.92,18.9Z"/>
        <path fill="#efdb5d" d="m194.09,89.66c2.2,2.88,2.75,6.68,1.76,10.17-.67,2.37-1.48,5.02-2.77,7.41-9.3,17.23-20.8,32.92-35.42,46.04-10.31,9.25-22.68,15.93-36.11,18.24-39.79,6.82-73.13-12.43-90.63-47.13-4.34-8.61-2.48-15.05,4.2-18.28,5.62-2.72,11.91-.29,13.92,5.6,8.48,24.84,39.24,45.69,68.88,38.64,13.54-3.22,24.8-10.81,33.98-21.58,9.65-11.31,18.26-23.18,24.58-36.69,2.05-4.38,5.65-7.25,11.23-6.16,2.79.54,4.84,1.73,6.38,3.76Z"/>
    </svg>
    <div class="header-text">
        <div class="brand">Say Alejandro</div>
        <div class="subtitle">Herramientas</div>
    </div>
    <div class="header-nav">
        <a href="index.html" class="nav-back">← Herramientas</a>
    </div>
</header>

<main>
    <div class="hero">
        <h1>Numerar páginas</h1>
        <p>Agrega números de página a tu PDF con posición, formato y estilo personalizados.</p>
    </div>

    <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".pdf">
        <div class="upload-icon-wrap">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <path d="M14 4L14 20" stroke="#832885" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M8 10L14 4L20 10" stroke="#832885" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 24H24" stroke="#832885" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
        </div>
        <h2>Arrastra tu PDF aquí</h2>
        <p>o haz clic para seleccionarlo</p>
        <div class="pdf-info" id="pdfInfo" style="display:none">
            <span class="pdf-badge" id="pdfName">—</span>
            <span class="pdf-badge" id="pdfPages">— páginas</span>
        </div>
    </div>

    <div id="optSection">
        <div class="opts-card">
            <h3>Configuración de numeración</h3>

            <div class="opt-row">
                <div class="opt-group">
                    <label>Formato</label>
                    <select id="selFormat">
                        <option value="n">1  /  2  /  3</option>
                        <option value="pn">Página 1  /  Página 2</option>
                        <option value="nt">1 de N  /  2 de N</option>
                    </select>
                </div>
                <div class="opt-group">
                    <label>Número inicial</label>
                    <input type="number" id="startNum" value="1" min="1" max="9999">
                </div>
                <div class="opt-group">
                    <label>Tamaño de fuente</label>
                    <input type="number" id="fontSize" value="11" min="6" max="24">
                </div>
            </div>

            <div class="opt-group" style="margin-bottom:0">
                <label>Posición</label>
                <div class="pos-grid">
                    <button class="pos-btn" data-pos="bl">
                        <svg width="22" height="16" viewBox="0 0 22 16" fill="none"><rect x="1" y="1" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.2" opacity=".3"/><rect x="2" y="11" width="7" height="3" rx="1" fill="currentColor" opacity=".5"/></svg>
                        Inferior izq.
                    </button>
                    <button class="pos-btn active" data-pos="bc">
                        <svg width="22" height="16" viewBox="0 0 22 16" fill="none"><rect x="1" y="1" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.2" opacity=".3"/><rect x="7.5" y="11" width="7" height="3" rx="1" fill="currentColor" opacity=".5"/></svg>
                        Inferior centro
                    </button>
                    <button class="pos-btn" data-pos="br">
                        <svg width="22" height="16" viewBox="0 0 22 16" fill="none"><rect x="1" y="1" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.2" opacity=".3"/><rect x="13" y="11" width="7" height="3" rx="1" fill="currentColor" opacity=".5"/></svg>
                        Inferior der.
                    </button>
                    <button class="pos-btn" data-pos="tl">
                        <svg width="22" height="16" viewBox="0 0 22 16" fill="none"><rect x="1" y="1" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.2" opacity=".3"/><rect x="2" y="2" width="7" height="3" rx="1" fill="currentColor" opacity=".5"/></svg>
                        Superior izq.
                    </button>
                    <button class="pos-btn" data-pos="tc">
                        <svg width="22" height="16" viewBox="0 0 22 16" fill="none"><rect x="1" y="1" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.2" opacity=".3"/><rect x="7.5" y="2" width="7" height="3" rx="1" fill="currentColor" opacity=".5"/></svg>
                        Superior centro
                    </button>
                    <button class="pos-btn" data-pos="tr">
                        <svg width="22" height="16" viewBox="0 0 22 16" fill="none"><rect x="1" y="1" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.2" opacity=".3"/><rect x="13" y="2" width="7" height="3" rx="1" fill="currentColor" opacity=".5"/></svg>
                        Superior der.
                    </button>
                </div>
            </div>

            <div class="preview-bar">
                <span class="preview-label">Vista previa</span>
                <span class="preview-text" id="previewText">1</span>
            </div>
        </div>

        <div id="actionsBar">
            <div class="opt opt-name">
                <label>Nombre del archivo</label>
                <input type="text" id="outputName" placeholder="documento" value="documento-numerado">
            </div>
            <div class="spacer"></div>
            <button class="btn-gen" id="btnGen">✨ Generar PDF</button>
        </div>

        <div class="progress-wrap" id="progressWrap">
            <div class="progress-label" id="progressLabel">Procesando...</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
    </div>
</main>

<footer>
    <span class="foot-brand">Say Alejandro</span>
    <span class="foot-sep">—</span>
    <span class="foot-text">Herramientas web</span>
</footer>
<div class="toast" id="toast"></div>

<script>
    const { PDFDocument, rgb, StandardFonts } = PDFLib;

    let pdfBytes   = null;
    let totalPages = 0;
    let position   = 'bc';

    const uploadZone    = document.getElementById('uploadZone');
    const fileInput     = document.getElementById('fileInput');
    const optSection    = document.getElementById('optSection');
    const pdfInfo       = document.getElementById('pdfInfo');
    const pdfNameEl     = document.getElementById('pdfName');
    const pdfPagesEl    = document.getElementById('pdfPages');
    const selFormat     = document.getElementById('selFormat');
    const startNum      = document.getElementById('startNum');
    const fontSize      = document.getElementById('fontSize');
    const outputName    = document.getElementById('outputName');
    const btnGen        = document.getElementById('btnGen');
    const previewText   = document.getElementById('previewText');
    const progressWrap  = document.getElementById('progressWrap');
    const progressFill  = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const toastEl       = document.getElementById('toast');

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
        e.preventDefault(); uploadZone.classList.remove('drag-over');
        const f = e.dataTransfer.files[0];
        if (f && /\.pdf$/i.test(f.name)) loadPDF(f);
        else showToast('Solo se aceptan archivos PDF', true);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadPDF(fileInput.files[0]); fileInput.value = ''; });

    // Position buttons
    document.querySelectorAll('.pos-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            position = btn.dataset.pos;
        });
    });

    // Live preview
    [selFormat, startNum].forEach(el => el.addEventListener('input', updatePreview));

    function updatePreview() {
        const n   = parseInt(startNum.value) || 1;
        const fmt = selFormat.value;
        let text;
        if      (fmt === 'n')  text = String(n);
        else if (fmt === 'pn') text = `Página ${n}`;
        else                   text = `${n} de ${totalPages || '?'}`;
        previewText.textContent = text;
    }

    async function loadPDF(file) {
        pdfBytes = await file.arrayBuffer();
        const { PDFDocument: PD } = PDFLib;
        const doc = await PD.load(pdfBytes, { ignoreEncryption: true });
        totalPages = doc.getPageCount();

        pdfNameEl.textContent  = file.name.length > 24 ? file.name.slice(0, 22) + '…' : file.name;
        pdfPagesEl.textContent = `${totalPages} página${totalPages > 1 ? 's' : ''}`;
        pdfInfo.style.display  = 'flex';
        optSection.style.display = 'block';
        updatePreview();
        showToast(`PDF cargado — ${totalPages} página${totalPages > 1 ? 's' : ''}`);
    }

    btnGen.addEventListener('click', generate);

    async function generate() {
        if (!pdfBytes) return;
        btnGen.disabled = true;
        setProgress(true, 'Cargando PDF…', 20);

        const name  = (outputName.value.trim() || 'documento').replace(/\.pdf$/i, '');
        const fmt   = selFormat.value;
        const start = parseInt(startNum.value) || 1;
        const fSize = Math.max(6, Math.min(24, parseInt(fontSize.value) || 11));
        const pos   = position;
        const margin = 22;

        try {
            const srcDoc = await PDFDocument.load(pdfBytes);
            const font   = await srcDoc.embedFont(StandardFonts.Helvetica);
            const pages  = srcDoc.getPages();
            const total  = pages.length;

            setProgress(true, 'Numerando páginas…', 40);

            pages.forEach((page, i) => {
                const { width, height } = page.getSize();
                const num  = start + i;
                let text;
                if      (fmt === 'n')  text = String(num);
                else if (fmt === 'pn') text = `Pagina ${num}`;
                else                   text = `${num} de ${total}`;

                const tw = font.widthOfTextAtSize(text, fSize);
                const isTop = pos.startsWith('t');

                let x;
                if      (pos.endsWith('l')) x = margin;
                else if (pos.endsWith('r')) x = width - tw - margin;
                else                        x = (width - tw) / 2;

                const y = isTop ? height - margin - fSize : margin;

                page.drawText(text, {
                    x, y,
                    size: fSize,
                    font,
                    color: rgb(0.227, 0.102, 0.302),
                    opacity: 0.72
                });
            });

            setProgress(true, 'Guardando…', 85);
            const bytes = await srcDoc.save();
            const blob  = new Blob([bytes], { type: 'application/pdf' });
            const url   = URL.createObjectURL(blob);
            const a     = document.createElement('a');
            a.href = url; a.download = name + '.pdf'; a.click();
            URL.revokeObjectURL(url);
            showToast(`PDF numerado descargado — ${total} páginas`);

        } catch (err) {
            showToast('Error: ' + err.message, true);
        } finally {
            setTimeout(() => { setProgress(false); btnGen.disabled = false; }, 1600);
        }
    }

    function setProgress(show, label = '', pct = 0) {
        progressWrap.classList.toggle('on', show);
        if (show) { progressLabel.textContent = label; progressFill.style.width = pct + '%'; }
        else progressFill.style.width = '0%';
    }

    let _tt;
    function showToast(msg, err = false) {
        toastEl.textContent = msg;
        toastEl.className = 'toast show' + (err ? ' err' : '');
        clearTimeout(_tt);
        _tt = setTimeout(() => toastEl.classList.remove('show'), 3200);
    }
</script>
</body>
</html>

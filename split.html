<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dividir PDF — Say Alejandro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --purple:       #832885;
            --purple-dark:  #5A2362;
            --purple-light: #EC6AFF;
            --yellow:       #EFDB5D;
            --yellow-dark:  #EABE59;
            --cream:        #F6EECA;
            --text:         #3a1a4d;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body { background: var(--cream); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

        header {
            background: var(--purple);
            box-shadow: 0 2px 16px rgba(90,35,98,.2);
            display: flex; align-items: center; gap: 14px;
            padding: 15px 36px; position: sticky; top: 0; z-index: 100;
        }
        .logo { width: 40px; height: 40px; flex-shrink: 0; }
        .header-text .brand { font-family: 'Titan One', cursive; font-size: 20px; color: var(--yellow); line-height: 1.15; letter-spacing: .01em; }
        .header-text .subtitle { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 10px; color: var(--cream); opacity: .45; letter-spacing: .14em; text-transform: uppercase; }
        .header-nav { margin-left: auto; }
        .nav-back { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px; color: rgba(246,238,202,.5); text-decoration: none; padding: 6px 14px; border: 1.5px solid rgba(246,238,202,.15); border-radius: 50px; transition: color .15s, border-color .15s; white-space: nowrap; }
        .nav-back:hover { color: var(--cream); border-color: rgba(246,238,202,.35); }

        main { flex: 1; width: 100%; max-width: 900px; margin: 0 auto; padding: 52px 24px 72px; }

        .hero { text-align: center; margin-bottom: 44px; }
        .hero h1 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(28px, 5vw, 46px); color: var(--purple); letter-spacing: -.015em; line-height: 1.1; margin-bottom: 14px; }
        .hero p { font-family: 'DM Sans', sans-serif; font-size: 15px; font-style: italic; color: var(--purple-dark); opacity: .55; max-width: 440px; margin: 0 auto; line-height: 1.65; }

        .upload-zone {
            position: relative; background: #fff;
            border: 2px dashed rgba(131,40,133,.28); border-radius: 20px;
            padding: 60px 40px; text-align: center; cursor: pointer;
            transition: border-color .2s, transform .18s, box-shadow .2s;
            box-shadow: 0 2px 20px rgba(90,35,98,.07);
        }
        .upload-zone:hover { border-color: var(--purple); transform: translateY(-2px); box-shadow: 0 12px 36px rgba(90,35,98,.13); }
        .upload-zone.drag-over { border-color: var(--purple-light); box-shadow: 0 0 0 4px rgba(236,106,255,.15); }
        .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .upload-icon-wrap { width: 56px; height: 56px; background: rgba(131,40,133,.08); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .upload-zone h2 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 19px; color: var(--purple); margin-bottom: 6px; }
        .upload-zone p { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--purple-dark); opacity: .5; }

        #pagesSection { margin-top: 44px; display: none; }

        .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .section-head h3 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px; color: var(--purple); }
        .sel-info { color: var(--purple); }

        .select-btns { display: flex; gap: 8px; }
        .btn-sel { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px; color: var(--purple); background: rgba(131,40,133,.08); border: 1.5px solid rgba(131,40,133,.2); border-radius: 50px; padding: 5px 14px; cursor: pointer; transition: background .15s; }
        .btn-sel:hover { background: rgba(131,40,133,.15); }

        #pagesGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }

        .page-card {
            background: #fff; border-radius: 14px; padding: 8px;
            cursor: pointer; transition: transform .15s, box-shadow .15s, border-color .15s;
            border: 2.5px solid transparent; user-select: none;
            box-shadow: 0 2px 10px rgba(90,35,98,.09); position: relative;
        }
        .page-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(90,35,98,.14); }
        .page-card.selected { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(131,40,133,.12); }
        .page-card.selected .check { opacity: 1; transform: scale(1); }

        .check {
            position: absolute; top: 6px; left: 6px;
            width: 20px; height: 20px; background: var(--purple);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: scale(.6); transition: opacity .15s, transform .2s; z-index: 2;
        }
        .pg-num {
            position: absolute; top: 6px; right: 6px;
            background: var(--purple-dark); color: var(--yellow);
            font-size: 10px; font-family: 'Nunito', sans-serif; font-weight: 700;
            padding: 2px 7px; border-radius: 6px; z-index: 2;
        }
        .thumb {
            width: 100%; aspect-ratio: 3/4; border-radius: 8px;
            overflow: hidden; background: rgba(131,40,133,.07);
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .thumb .ph { font-size: 28px; opacity: .25; }
        .card-label { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--purple-dark); text-align: center; display: block; }

        #actionsBar {
            margin-top: 24px; background: var(--purple-dark); border-radius: 16px;
            padding: 20px 22px; display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap;
        }
        .opt { display: flex; flex-direction: column; gap: 6px; }
        .opt label { font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 800; color: var(--cream); opacity: .45; text-transform: uppercase; letter-spacing: .1em; }
        .opt select, .opt input[type="text"] {
            background: rgba(131,40,133,.3); border: 1.5px solid rgba(246,238,202,.15);
            color: var(--cream); border-radius: 10px; padding: 9px 12px;
            font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color .15s;
        }
        .opt select:focus, .opt input:focus { border-color: rgba(246,238,202,.4); }
        .opt select option { background: var(--purple-dark); }
        .opt input::placeholder { color: rgba(246,238,202,.25); }
        .opt-name { flex: 1; min-width: 160px; }
        .spacer { flex: 1; }

        .btn-gen {
            background: var(--yellow); color: var(--purple-dark); border: none;
            border-radius: 50px; padding: 12px 28px;
            font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 15px;
            cursor: pointer; transition: background .2s, transform .18s, box-shadow .2s;
            display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        .btn-gen:hover:not(:disabled) { background: var(--yellow-dark); transform: scale(1.04); box-shadow: 0 6px 22px rgba(234,190,89,.3); }
        .btn-gen:disabled { opacity: .35; cursor: not-allowed; }

        .progress-wrap { margin-top: 18px; display: none; }
        .progress-wrap.on { display: block; }
        .progress-label { font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; color: var(--cream); opacity: .55; margin-bottom: 8px; }
        .progress-bar { height: 4px; background: rgba(239,219,93,.1); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--yellow), var(--purple-light)); border-radius: 2px; transition: width .3s ease; }

        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--purple-dark); border: 1.5px solid var(--yellow); color: var(--yellow);
            padding: 12px 24px; border-radius: 50px;
            font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px;
            transition: transform .35s cubic-bezier(.34,1.56,.64,1);
            z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,.4); white-space: nowrap; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.err { border-color: var(--purple-light); color: var(--purple-light); }

        footer { background: var(--purple-dark); border-top: 2px solid var(--purple); text-align: center; padding: 18px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        footer .foot-brand { font-family: 'Titan One', cursive; font-size: 13px; color: var(--yellow); opacity: .35; }
        footer .foot-sep { font-size: 13px; color: var(--cream); opacity: .2; }
        footer .foot-text { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--cream); opacity: .2; }

        @media (max-width: 600px) {
            header { padding: 13px 18px; }
            main { padding: 36px 16px 56px; }
            .upload-zone { padding: 48px 20px; }
            #actionsBar { flex-direction: column; align-items: stretch; }
            .spacer { display: none; }
            .btn-gen { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <svg class="logo" viewBox="0 0 224.93 224.93" xmlns="http://www.w3.org/2000/svg">
        <rect fill="#832885" x="0" y="0" width="224.93" height="224.93" rx="112.47" ry="112.47"/>
        <path fill="#efdb5d" d="m137.83,91.89c-11,1.62-20.85-5.4-22.79-16.14-1.89-10.46,4.89-20.84,15.26-23.18,11.63-2.63,22.81,5.17,24.44,16.61,1.57,11.07-5.89,21.09-16.91,22.71Z"/>
        <path fill="#efdb5d" d="m81.25,92.22c-9.42,1.5-17.68-4.46-19.17-13.83-1.48-9.28,4.69-17.77,13.94-19.18,9.19-1.4,17.73,4.89,19.15,14.11,1.39,9-4.84,17.46-13.92,18.9Z"/>
        <path fill="#efdb5d" d="m194.09,89.66c2.2,2.88,2.75,6.68,1.76,10.17-.67,2.37-1.48,5.02-2.77,7.41-9.3,17.23-20.8,32.92-35.42,46.04-10.31,9.25-22.68,15.93-36.11,18.24-39.79,6.82-73.13-12.43-90.63-47.13-4.34-8.61-2.48-15.05,4.2-18.28,5.62-2.72,11.91-.29,13.92,5.6,8.48,24.84,39.24,45.69,68.88,38.64,13.54-3.22,24.8-10.81,33.98-21.58,9.65-11.31,18.26-23.18,24.58-36.69,2.05-4.38,5.65-7.25,11.23-6.16,2.79.54,4.84,1.73,6.38,3.76Z"/>
    </svg>
    <div class="header-text">
        <div class="brand">Say Alejandro</div>
        <div class="subtitle">Herramientas</div>
    </div>
    <div class="header-nav">
        <a href="index.html" class="nav-back">← Herramientas</a>
    </div>
</header>

<main>
    <div class="hero">
        <h1>Dividir PDF</h1>
        <p>Selecciona las páginas que quieres extraer y descárgalas como un PDF único o como archivos separados en ZIP.</p>
    </div>

    <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".pdf">
        <div class="upload-icon-wrap">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <path d="M14 4L14 20" stroke="#832885" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M8 10L14 4L20 10" stroke="#832885" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 24H24" stroke="#832885" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
        </div>
        <h2>Arrastra tu PDF aquí</h2>
        <p>o haz clic para seleccionarlo</p>
    </div>

    <div id="pagesSection">
        <div class="section-head">
            <h3>Páginas · <span id="pgCount">0</span> &nbsp;·&nbsp; <span class="sel-info" id="selCount">0 seleccionadas</span></h3>
            <div class="select-btns">
                <button class="btn-sel" id="btnSelAll">Todas</button>
                <button class="btn-sel" id="btnSelNone">Ninguna</button>
            </div>
        </div>

        <div id="pagesGrid"></div>

        <div id="actionsBar">
            <div class="opt">
                <label>Modo</label>
                <select id="selMode">
                    <option value="single">PDF único con selección</option>
                    <option value="zip">ZIP — un PDF por página</option>
                </select>
            </div>
            <div class="opt opt-name">
                <label>Nombre del archivo</label>
                <input type="text" id="outputName" placeholder="documento" value="documento">
            </div>
            <div class="spacer"></div>
            <button class="btn-gen" id="btnGen" disabled>✨ Descargar</button>
        </div>

        <div class="progress-wrap" id="progressWrap">
            <div class="progress-label" id="progressLabel">Procesando...</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
    </div>
</main>

<footer>
    <span class="foot-brand">Say Alejandro</span>
    <span class="foot-sep">—</span>
    <span class="foot-text">Herramientas web</span>
</footer>
<div class="toast" id="toast"></div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    const { PDFDocument } = PDFLib;

    let pdfBytes  = null;
    let totalPages = 0;
    let selected  = new Set();
    let pdfJsDoc  = null;

    const uploadZone    = document.getElementById('uploadZone');
    const fileInput     = document.getElementById('fileInput');
    const pagesSection  = document.getElementById('pagesSection');
    const pagesGrid     = document.getElementById('pagesGrid');
    const pgCount       = document.getElementById('pgCount');
    const selCount      = document.getElementById('selCount');
    const btnGen        = document.getElementById('btnGen');
    const btnSelAll     = document.getElementById('btnSelAll');
    const btnSelNone    = document.getElementById('btnSelNone');
    const selMode       = document.getElementById('selMode');
    const outputName    = document.getElementById('outputName');
    const progressWrap  = document.getElementById('progressWrap');
    const progressFill  = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const toastEl       = document.getElementById('toast');

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
        e.preventDefault(); uploadZone.classList.remove('drag-over');
        const f = e.dataTransfer.files[0];
        if (f && /\.pdf$/i.test(f.name)) loadPDF(f);
        else showToast('Solo se aceptan archivos PDF', true);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadPDF(fileInput.files[0]); fileInput.value = ''; });
    btnSelAll.addEventListener('click',  () => { for (let i = 0; i < totalPages; i++) selected.add(i); updateCards(); });
    btnSelNone.addEventListener('click', () => { selected.clear(); updateCards(); });
    btnGen.addEventListener('click', generate);

    async function loadPDF(file) {
        pdfBytes = await file.arrayBuffer();
        pdfJsDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
        totalPages = pdfJsDoc.numPages;
        selected = new Set(Array.from({ length: totalPages }, (_, i) => i));

        pgCount.textContent = totalPages;
        pagesGrid.innerHTML = '';

        for (let i = 0; i < totalPages; i++) {
            pagesGrid.appendChild(buildCard(i));
        }
        updateCards();
        pagesSection.style.display = 'block';
        showToast(`PDF cargado — ${totalPages} página${totalPages > 1 ? 's' : ''}`);

        for (let i = 0; i < totalPages; i++) renderThumb(i);
    }

    function buildCard(idx) {
        const card = document.createElement('div');
        card.className = 'page-card selected';
        card.dataset.idx = idx;
        card.innerHTML = `
            <div class="check"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5L4.5 8L9 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="pg-num">${idx + 1}</div>
            <div class="thumb"><span class="ph">📄</span></div>
            <span class="card-label">Página ${idx + 1}</span>
        `;
        card.addEventListener('click', () => {
            selected.has(idx) ? selected.delete(idx) : selected.add(idx);
            updateCards();
        });
        return card;
    }

    async function renderThumb(idx) {
        try {
            const page = await pdfJsDoc.getPage(idx + 1);
            const vp   = page.getViewport({ scale: 0.45 });
            const canvas = document.createElement('canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
            const card = pagesGrid.children[idx];
            if (card) card.querySelector('.thumb').innerHTML = `<img src="${canvas.toDataURL()}" alt="">`;
        } catch {}
    }

    function updateCards() {
        pagesGrid.querySelectorAll('.page-card').forEach(card => {
            const i = parseInt(card.dataset.idx);
            card.classList.toggle('selected', selected.has(i));
        });
        const n = selected.size;
        selCount.textContent = `${n} seleccionada${n !== 1 ? 's' : ''}`;
        btnGen.disabled = n === 0;
    }

    async function generate() {
        if (!pdfBytes || selected.size === 0) return;
        btnGen.disabled = true;
        const mode = selMode.value;
        const name = (outputName.value.trim() || 'documento').replace(/\.pdf$/i, '');
        const pages = Array.from(selected).sort((a, b) => a - b);

        try {
            const srcDoc = await PDFDocument.load(pdfBytes);

            if (mode === 'single') {
                setProgress(true, 'Generando PDF…', 40);
                const outDoc = await PDFDocument.create();
                const copied = await outDoc.copyPages(srcDoc, pages);
                copied.forEach(p => outDoc.addPage(p));
                setProgress(true, 'Finalizando…', 90);
                const bytes = await outDoc.save();
                download(new Blob([bytes], { type: 'application/pdf' }), name + '.pdf');
                showToast(`PDF descargado — ${pages.length} página${pages.length > 1 ? 's' : ''}`);

            } else {
                const zip = new JSZip();
                for (let i = 0; i < pages.length; i++) {
                    setProgress(true, `Generando página ${i + 1} de ${pages.length}…`, Math.round((i / pages.length) * 88));
                    const outDoc = await PDFDocument.create();
                    const [pg]   = await outDoc.copyPages(srcDoc, [pages[i]]);
                    outDoc.addPage(pg);
                    zip.file(`${name}-p${pages[i] + 1}.pdf`, await outDoc.save());
                }
                setProgress(true, 'Comprimiendo ZIP…', 95);
                const blob = await zip.generateAsync({ type: 'blob' });
                download(blob, name + '.zip');
                showToast(`ZIP descargado — ${pages.length} páginas`);
            }
        } catch (err) {
            showToast('Error: ' + err.message, true);
        } finally {
            setTimeout(() => { setProgress(false); btnGen.disabled = false; }, 1600);
        }
    }

    function download(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
    }

    function setProgress(show, label = '', pct = 0) {
        progressWrap.classList.toggle('on', show);
        if (show) { progressLabel.textContent = label; progressFill.style.width = pct + '%'; }
        else progressFill.style.width = '0%';
    }

    let _tt;
    function showToast(msg, err = false) {
        toastEl.textContent = msg;
        toastEl.className = 'toast show' + (err ? ' err' : '');
        clearTimeout(_tt);
        _tt = setTimeout(() => toastEl.classList.remove('show'), 3200);
    }
</script>
</body>
</html>
